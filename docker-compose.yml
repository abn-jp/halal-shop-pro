version: '3.8'

# Local development stack — mirrors Railway production environment
#
# Usage:
#   docker compose up -d                  ← start the site
#   docker compose run --rm setup         ← install Polylang + configure languages
#   docker compose down                   ← stop everything

services:

  wordpress:
    build: .
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_DEBUG: 0
    volumes:
      - wp_core:/var/www/html              # full WP filesystem (shared with setup service)
      - wp_uploads:/var/www/html/wp-content/uploads
      - wp_plugins:/var/www/html/wp-content/plugins
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

